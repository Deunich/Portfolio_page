<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

/* ── Populate static content ─────────────────────────────────── */
document.getElementById('pres-title').textContent     = PROJECT.title;
document.getElementById('pres-desc').textContent      = PROJECT.description;
document.getElementById('pres-category').textContent  = PROJECT.category  ?? '';
document.getElementById('pres-year-val').textContent  = PROJECT.year      ?? '—';
document.getElementById('pres-tools-val').textContent = PROJECT.tags.length;
document.getElementById('pres-download').href         = PROJECT.downloadUrl;
document.getElementById('pres-download').download     = PROJECT.title;
document.getElementById('pres-iframe').src            = PROJECT.pdfUrl;
document.title = PROJECT.title + ' – Camilo Sierra';

// Filename from URL
const fname = PROJECT.pdfUrl.split('/').pop();
document.getElementById('pres-filename').textContent = fname;

// Tags
const tagsEl = document.getElementById('pres-tags');
PROJECT.tags.forEach(t => {
  const s = document.createElement('span');
  s.className   = 'tech-tag';
  s.textContent = t;
  tagsEl.appendChild(s);
});

// Takeaways (numbered)
const listEl = document.getElementById('pres-takeaways-list');
PROJECT.takeaways.slice(0, 3).forEach((text, i) => {
  const item = document.createElement('div');
  item.className = 'takeaway-item reveal';
  item.innerHTML = `
    <span class="takeaway-num">0${i + 1}</span>
    <span class="takeaway-text">${text}</span>
  `;
  listEl.appendChild(item);
});

/* ── Mobile detection ────────────────────────────────────────── */
const BREAKPOINT = 600;
const isMobile   = () => window.innerWidth < BREAKPOINT;

function applyLayout() {
  const mobile = isMobile();
  document.getElementById('pres-iframe').style.display  = mobile ? 'block' : 'none';
  document.getElementById('pres-desktop').style.display = mobile ? 'none'  : 'flex';
  document.getElementById('pres-desktop').style.flexDirection = 'column';
  document.getElementById('pres-desktop').style.alignItems    = 'center';
  document.getElementById('pres-desktop').style.width         = '100%';
}
applyLayout();
window.addEventListener('resize', applyLayout);

/* ── PDF viewer state ────────────────────────────────────────── */
let pdfDoc      = null;
let currentPage = 1;
let totalPages  = 0;
let renderTask  = null;
let fitWidth    = 820; // base fit width, updated each render

/* ── Zoom state ──────────────────────────────────────────────── */
const MIN_ZOOM  = 0.5;
const MAX_ZOOM  = 2.5;
const ZOOM_STEP = 0.25;
let zoomLevel   = 1.0;

const canvas         = document.getElementById('pres-canvas');
const ctx            = canvas.getContext('2d');
const loader         = document.getElementById('pres-loader');
const indicator      = document.getElementById('pres-indicator');
const toolbarBadge   = document.getElementById('pres-toolbar-indicator');
const slidesVal      = document.getElementById('pres-slides-val');
const progressFill   = document.getElementById('pres-progress-fill');
const prevBtn        = document.getElementById('pres-prev');
const nextBtn        = document.getElementById('pres-next');
const wrap           = document.getElementById('pres-canvas-wrap');
const zoomInBtn      = document.getElementById('pres-zoom-in');
const zoomOutBtn     = document.getElementById('pres-zoom-out');
const zoomLevelEl    = document.getElementById('pres-zoom-level');

function updateUI(num) {
  indicator.textContent    = `${num} / ${totalPages}`;
  toolbarBadge.textContent = `${num} / ${totalPages}`;
  prevBtn.disabled         = num <= 1;
  nextBtn.disabled         = num >= totalPages;
  progressFill.style.width = `${(num / totalPages) * 100}%`;
}

function applyZoom() {
  canvas.style.width  = `${Math.round(fitWidth * zoomLevel)}px`;
  canvas.style.height = 'auto';
  zoomLevelEl.textContent = `${Math.round(zoomLevel * 100)}%`;
  zoomOutBtn.disabled = zoomLevel <= MIN_ZOOM;
  zoomInBtn.disabled  = zoomLevel >= MAX_ZOOM;
}

/* ── Render one page ─────────────────────────────────────────── */
async function renderPage(num) {
  if (!pdfDoc) return;
  if (renderTask) { try { renderTask.cancel(); } catch(_){} }

  wrap.classList.remove('pres-fade-in');
  wrap.classList.add('pres-fade-out');
  await new Promise(r => setTimeout(r, 130));

  const page  = await pdfDoc.getPage(num);
  fitWidth    = Math.min(wrap.clientWidth - 40, 820); // 40px padding
  const baseVP   = page.getViewport({ scale: 1 });
  const scale    = fitWidth / baseVP.width;
  const viewport = page.getViewport({ scale });

  canvas.width  = viewport.width;
  canvas.height = viewport.height;

  try {
    renderTask = page.render({ canvasContext: ctx, viewport });
    await renderTask.promise;
  } catch(e) {
    if (e?.name !== 'RenderingCancelledException') throw e;
    return;
  }

  wrap.classList.remove('pres-fade-out');
  wrap.classList.add('pres-fade-in');
  applyZoom();
  updateUI(num);
}

/* ── Load PDF ────────────────────────────────────────────────── */
(async () => {
  try {
    pdfDoc      = await pdfjsLib.getDocument(PROJECT.pdfUrl).promise;
    totalPages  = pdfDoc.numPages;
    slidesVal.textContent = totalPages;
    loader.style.display  = 'none';
    await renderPage(1);
  } catch(err) {
    loader.innerHTML = `
      <i class="fas fa-exclamation-circle" style="font-size:2rem;color:#e55;margin-bottom:8px"></i>
      <span style="color:#e55;text-align:center">Could not load PDF.<br>Check the path in <code>PROJECT.pdfUrl</code>.</span>`;
    console.error('[Viewer]', err);
  }
})();

/* ── Navigation ──────────────────────────────────────────────── */
prevBtn.addEventListener('click', () => {
  if (currentPage > 1) { currentPage--; renderPage(currentPage); }
});
nextBtn.addEventListener('click', () => {
  if (currentPage < totalPages) { currentPage++; renderPage(currentPage); }
});

document.addEventListener('keydown', e => {
  if (isMobile() || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (currentPage < totalPages) { currentPage++; renderPage(currentPage); }
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (currentPage > 1) { currentPage--; renderPage(currentPage); }
  }
});

/* ── Zoom ────────────────────────────────────────────────────── */
zoomInBtn.addEventListener('click', () => {
  if (zoomLevel < MAX_ZOOM) {
    zoomLevel = Math.min(MAX_ZOOM, parseFloat((zoomLevel + ZOOM_STEP).toFixed(2)));
    applyZoom();
  }
});

zoomOutBtn.addEventListener('click', () => {
  if (zoomLevel > MIN_ZOOM) {
    zoomLevel = Math.max(MIN_ZOOM, parseFloat((zoomLevel - ZOOM_STEP).toFixed(2)));
    applyZoom();
  }
});

// Click zoom label to reset to 100%
zoomLevelEl.addEventListener('click', () => {
  zoomLevel = 1.0;
  applyZoom();
});

/* ── Fullscreen ──────────────────────────────────────────────── */
const fsBtn   = document.getElementById('pres-fs-btn');
const stage   = document.getElementById('pres-stage');
const fsIcon  = fsBtn.querySelector('i');

fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) stage.requestFullscreen();
  else document.exitFullscreen();
});

document.addEventListener('fullscreenchange', () => {
  const full = !!document.fullscreenElement;
  fsIcon.className = full ? 'fas fa-compress' : 'fas fa-expand';
  fsBtn.setAttribute('aria-label', full ? 'Exit fullscreen' : 'Enter fullscreen');
  setTimeout(() => renderPage(currentPage), 80);
});

/* ── Scroll reveal ───────────────────────────────────────────── */
const observer = new IntersectionObserver(
  entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
  { threshold: 0.1 }
);
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

/* ── Hamburger ───────────────────────────────────────────────── */
const hamburger = document.getElementById('hamburger');
const navRight  = document.getElementById('nav-right');
hamburger?.addEventListener('click', () => {
  const open = navRight.classList.toggle('open');
  hamburger.classList.toggle('open', open);
  hamburger.setAttribute('aria-expanded', open);
});
</script>

</body>
</html>
