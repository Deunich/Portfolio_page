<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fondo azul marino oscuro -->
  <rect width="192" height="192" rx="36" fill="#0a1929"/>
  <!-- Borde sutil dorado -->
  <rect x="3" y="3" width="186" height="186" rx="33" fill="none" stroke="#c8962e" stroke-width="4" opacity="0.25"/>
  <!-- Inicial "C" -->
  <text x="68" y="128" font-family="Inter, -apple-system, 'Segoe UI', sans-serif" font-size="100" font-weight="800" fill="#c8962e" text-anchor="middle" dominant-baseline="central">C</text>
  <!-- Inicial "S" superpuesta ligeramente a la derecha -->
  <text x="118" y="128" font-family="Inter, -apple-system, 'Segoe UI', sans-serif" font-size="88" font-weight="700" fill="#c8962e" text-anchor="middle" dominant-baseline="central" opacity="0.85">S</text>
</svg>

