<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="#2563eb"/>
  <!-- Bar chart bars (data analytics icon) -->
  <!-- Left bar -->
  <rect x="32" y="110" width="34" height="58" rx="6" fill="#ffffff"/>
  <!-- Middle bar (tallest) -->
  <rect x="79" y="60" width="34" height="108" rx="6" fill="#ffffff" opacity="0.95"/>
  <!-- Right bar -->
  <rect x="126" y="82" width="34" height="86" rx="6" fill="#ffffff" opacity="0.85"/>
  <!-- Baseline -->
  <rect x="24" y="172" width="144" height="6" rx="3" fill="#ffffff" opacity="0.5"/>
  <!-- Trend line dot on top of middle bar -->
  <circle cx="49" cy="103" r="6" fill="#93c5fd"/>
  <circle cx="96" cy="53" r="6" fill="#93c5fd"/>
  <circle cx="143" cy="75" r="6" fill="#93c5fd"/>
  <!-- Trend line connecting dots -->
  <polyline points="49,103 96,53 143,75" fill="none" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
